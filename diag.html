<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SDP Diag</title>
<style>
body{font:14px monospace;background:#111;color:#0f0;padding:16px;white-space:pre-wrap;word-break:break-all}
.err{color:red}.ok{color:#0f0}.hl{color:#ff0}.s{color:#888}
#out{margin-top:12px}
</style>
</head>
<body>
<div id="status">初始化...</div>
<div id="out"></div>
<script type="module">
import { extractFields, createTemplateSdp, applyFields } from '../src/core/webrtc.ts';

const log = (cls, text) => { const d=document.getElementById('out'); d.innerHTML+='<span class="'+cls+'">'+text+'</span>\n'; };
const setStatus = s => document.getElementById('status').textContent = s;

async function run() {
  setStatus('Step 1: 生成原生 offer...');
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  pc.createDataChannel('game');
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  log('ok', '✅ offer 创建成功');
  log('s', '--- 原始 SDP (前600字) ---');
  log('', offer.sdp.substring(0, 600));

  setStatus('Step 2: extractFields...');
  const fields = extractFields(offer.sdp);
  log('ok', '✅ extractFields: u='+fields.u+' w='+fields.w.substring(0,8)+'... s='+fields.s+' p='+fields.p+' c='+fields.c.length);
  if (fields.c.length === 0) {
    log('err', '❌ candidates 为空！原始 SDP 中候选行：');
    const cands = offer.sdp.split('\r\n').filter(l => l.startsWith('a=candidate'));
    cands.forEach(c => log('s', '  '+c));
    log('err', '  → 正则没匹配到任何 UDP host candidate');
  }

  setStatus('Step 3: createTemplateSdp...');
  const template = await createTemplateSdp();
  log('ok', '✅ 模板创建成功 (' + template.length + ' chars)');
  log('s', '--- 浏览器模板 (前400字) ---');
  log('', template.substring(0, 400));

  setStatus('Step 4: applyFields...');
  const rebuilt = applyFields(template, fields);
  log('ok', '✅ 重建 SDP (' + rebuilt.length + ' chars)');
  log('s', '--- 重建 SDP ---');
  log('', rebuilt);

  setStatus('Step 5: setRemoteDescription(重建SDP)...');
  const pc2 = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  pc2.ondatachannel = () => {};
  try {
    await pc2.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: rebuilt }));
    log('ok', '✅ setRemoteDescription 成功！');
  } catch(e) {
    log('err', '❌ setRemoteDescription 失败:');
    log('err', '   ' + e.message);
    
    // 找出具体哪行报错
    const lines = rebuilt.split('\r\n');
    for (let i = 0; i < lines.length; i++) {
      const pc3 = new RTCPeerConnection();
      try {
        const partial = lines.slice(0, i+1).join('\r\n');
        await pc3.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: partial }));
      } catch(pe) {
        log('hl', '  → 报错行 #' + i + ': ' + lines[i].substring(0, 80));
        log('hl', '  → 错误: ' + pe.message);
        break;
      }
      pc3.close();
    }
  }
  pc2.close();
  pc.close();
  setStatus('完成');
}

run().catch(e => { log('err', 'FATAL: ' + e.message); setStatus('失败'); });
</script>
</body>
</html>
